version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo-container
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: audio-backend-container
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/awgp_audio

  frontend:
    build: ./frontend
    container_name: audio-frontend-container
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data: